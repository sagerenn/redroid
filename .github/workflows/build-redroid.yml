name: Build Redroid 13 with Magisk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify-image:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for layout verification
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t redroid-verify:${{ matrix.arch }} \
            .

      - name: Verify image layout
        run: ./scripts/verify-image-layout.sh redroid-verify:${{ matrix.arch }} ${{ matrix.arch }}

  runtime-test:
    runs-on: ubuntu-24.04
    needs: verify-image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare host for redroid
        run: ./scripts/prepare-redroid-host.sh

      - name: Build amd64 runtime image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f Dockerfile.amd64 \
            -t redroid-runtime:amd64 \
            .

      - name: Run real e2e test
        env:
          BOOT_TIMEOUT_SECONDS: 300
        run: ./scripts/redroid-e2e.sh redroid-runtime:amd64 redroid-runtime-amd64

  publish:
    runs-on: ubuntu-24.04
    needs: [verify-image, runtime-test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=13-magisk-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    needs: publish
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          echo "Multi-architecture manifest created"
