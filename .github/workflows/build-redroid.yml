name: Build Redroid 13 with Magisk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for layout verification
        run: |
          # Native runner per arch — no QEMU user-mode translation for arm64.
          # Magisk is compiled from source inside the magisk-src stage (long).
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t redroid-verify:${{ matrix.arch }} \
            --build-arg BUILDPLATFORM=${{ matrix.platform }} \
            --cache-from type=gha,scope=redroid-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=redroid-${{ matrix.arch }} \
            .

      - name: Verify image layout
        run: ./scripts/verify-image-layout.sh redroid-verify:${{ matrix.arch }} ${{ matrix.arch }}

  runtime-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64
            runner: ubuntu-24.04
            image_tag: redroid-runtime:amd64
            container_name: redroid-runtime-amd64
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
            runner: ubuntu-24.04-arm
            image_tag: redroid-runtime:arm64
            container_name: redroid-runtime-arm64
    runs-on: ${{ matrix.runner }}
    needs: verify-image
    # Magisk-from-source rebuild (or cache restore) + redroid boot + UI e2e.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare host for redroid
        run: ./scripts/prepare-redroid-host.sh

      - name: Build runtime image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.image_tag }} \
            --build-arg BUILDPLATFORM=${{ matrix.platform }} \
            --cache-from type=gha,scope=redroid-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=redroid-${{ matrix.arch }} \
            .

      - name: Run real e2e test
        env:
          BOOT_TIMEOUT_SECONDS: 360
        run: ./scripts/redroid-e2e.sh ${{ matrix.image_tag }} ${{ matrix.container_name }}

  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    needs: [verify-image, runtime-test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=13-magisk-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDPLATFORM=${{ matrix.platform }}
          cache-from: type=gha,scope=redroid-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=redroid-${{ matrix.arch }}

  manifest:
    needs: publish
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          echo "Multi-architecture manifest created"
