name: Build Redroid 13 with Magisk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REDROID_AOSP_TAG: android-13.0.0_r82
  REDROID_LOCAL_MANIFEST_BRANCH: "13.0.0"

# AOSP host tools/prebuilts are x86_64-only: always compile redroid bases on
# ubuntu-24.04, then layer Magisk + e2e on native arch runners (arm64 without QEMU).

jobs:
  aosp-base:
    strategy:
      fail-fast: false
      matrix:
        include:
          - product_arch: arm64
            platform: linux/arm64
            lunch: redroid_arm64_only-userdebug
            base_tag: redroid-base-arm64
          - product_arch: amd64
            platform: linux/amd64
            lunch: redroid_x86_64-userdebug
            base_tag: redroid-base-amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    steps:
      # Free bulky toolchains BEFORE maximize so their free space is absorbed into the LVM
      # build volume (post-maximize deletes do not grow the already-created LV).
      - name: Free disk before maximize
        run: |
          set -eux
          df -h
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            "${AGENT_TOOLSDIRECTORY:-}" /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/share/powershell /usr/share/miniconda /usr/local/miniconda \
            /usr/lib/jvm /opt/hostedtoolcache /usr/share/az_* /opt/az \
            /usr/share/gradle /usr/share/kotlin /usr/local/lib/node_modules \
            /usr/local/share/edge_driver /usr/local/share/gecko_driver \
            /usr/local/share/chrome_driver /usr/local/share/vcpkg \
            /opt/microsoft /usr/share/sbt /usr/local/aws-cli /usr/local/aws-sam-cli \
            /usr/share/apache-maven* /usr/share/rvm /home/linuxbrew || true
          docker system prune -af || true
          sudo apt-get clean || true
          df -h

      # Install apt deps BEFORE maximize. After maximize, / is ~100% full regardless of
      # root-reserve-mb (ext4 reserved blocks + fallocate eat the "reserve"; observed
      # ~100MB free on both arm/amd runners). Never apt-get after maximize.
      - name: Install host build deps
        run: |
          set -eux
          df -h /
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git-lfs curl ca-certificates libxml2-utils python3 python-is-python3 \
            rsync zip unzip
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          git lfs install --skip-repo || true
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod 755 "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.email "ci@github-actions.local"
          git config --global user.name "github-actions"
          git config --global gc.auto 0
          git config --global maintenance.auto false
          df -h /

      # Large LVM at /mnt/build. root-reserve is best-effort only — do not put
      # checkout, Docker data, AOSP, or tmp on / after this step.
      - name: Maximize build disk space
        uses: easimon/maximize-build-space@v10
        with:
          build-mount-path: /mnt/build
          root-reserve-mb: 2048
          temp-reserve-mb: 100
          swap-size-mb: 2048
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Verify build volume capacity
        run: |
          set -eux
          df -h
          # Sweep leftover toolchains on root (does not enlarge LVM).
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/powershell \
            /var/lib/apt/lists/* /var/cache/apt/archives/* || true
          sudo apt-get clean || true
          # Host temp + agent caches off root so residual ~100MB free is enough.
          mkdir -p /mnt/build/tmp /mnt/build/home /mnt/build/src /mnt/build/artifacts
          # Prefer build volume for anything that would otherwise land on /.
          echo "TMPDIR=/mnt/build/tmp" >> "$GITHUB_ENV"
          echo "TMP=/mnt/build/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/mnt/build/tmp" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=/mnt/build/home/.cache" >> "$GITHUB_ENV"
          root_avail_kb=$(df -Pk / | awk 'NR==2 {print $4}')
          echo "root_avail_kb=${root_avail_kb} (expected low ~100MB after maximize; heavy I/O is on /mnt/build)"
          avail_kb=$(df -Pk /mnt/build | awk 'NR==2 {print $4}')
          echo "build_volume_avail_kb=${avail_kb}"
          if [ "${avail_kb}" -lt $((110 * 1024 * 1024)) ]; then
            echo "::warning::Build volume has ${avail_kb} KB free (<110 GiB ideal); continuing if >= 90 GiB"
          fi
          if [ "${avail_kb}" -lt $((90 * 1024 * 1024)) ]; then
            echo "::error::Build volume only has ${avail_kb} KB free; need >= 90 GiB for AOSP"
            exit 1
          fi

      - name: Point Docker data-root at build volume
        run: |
          set -euo pipefail
          docker_root=/mnt/build/docker-data
          mkdir -p "$docker_root"
          sudo systemctl stop docker.socket docker || true
          sudo mkdir -p /etc/docker
          if [ -f /etc/docker/daemon.json ]; then
            sudo cp /etc/docker/daemon.json /etc/docker/daemon.json.bak
          fi
          printf '%s\n' "{\"data-root\":\"${docker_root}\"}" | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info | grep -E 'Docker Root Dir|Storage Driver'
          df -h /mnt/build /

      # Absolute path: checkout resolves under $GITHUB_WORKSPACE, but path.resolve
      # keeps an absolute path so the repo lands on the LVM, not full root.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: /mnt/build/src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build redroid base from AOSP source
        working-directory: /mnt/build/src
        env:
          REDROID_AOSP_TAG: ${{ env.REDROID_AOSP_TAG }}
          REDROID_LOCAL_MANIFEST_BRANCH: ${{ env.REDROID_LOCAL_MANIFEST_BRANCH }}
          REDROID_LUNCH: ${{ matrix.lunch }}
          REDROID_OUT_IMAGE_TAG: ${{ matrix.base_tag }}
          REDROID_PLATFORM: ${{ matrix.platform }}
          REDROID_SRC: /mnt/build/aosp
          REDROID_TMPDIR: /mnt/build/tmp
          REDROID_JOBS: "4"
          REDROID_SYNC_JOBS: "1"
          REDROID_CLEAN_SRC: "1"
          REDROID_MAKE_TARGETS: "systemimage vendorimage"
        run: |
          chmod +x scripts/build-redroid-from-source.sh
          mkdir -p /mnt/build/aosp /mnt/build/tmp
          ./scripts/build-redroid-from-source.sh
          df -h
          docker system df || true

      - name: Export base image artifact
        working-directory: /mnt/build/src
        run: |
          set -euo pipefail
          docker image inspect "${{ matrix.base_tag }}" --format '{{.Id}} {{.Architecture}} {{.Size}}'
          mkdir -p /mnt/build/artifacts
          # Drop builder image before save to free Docker storage.
          docker rmi redroid-aosp-builder || true
          docker system prune -af || true
          docker save "${{ matrix.base_tag }}" | gzip -1 > "/mnt/build/artifacts/${{ matrix.base_tag }}.tar.gz"
          ls -lh "/mnt/build/artifacts/${{ matrix.base_tag }}.tar.gz"
          df -h

      - name: Upload base image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.base_tag }}
          path: /mnt/build/artifacts/${{ matrix.base_tag }}.tar.gz
          retention-days: 3
          if-no-files-found: error

  build-test:
    needs: aosp-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
            runner: ubuntu-24.04-arm
            base_tag: redroid-base-arm64
            image_tag: redroid:arm64
            container_name: redroid-e2e-arm64
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64
            runner: ubuntu-24.04
            base_tag: redroid-base-amd64
            image_tag: redroid:amd64
            container_name: redroid-e2e-amd64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download redroid base image
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.base_tag }}
          path: artifacts

      - name: Load base image
        run: |
          set -euo pipefail
          gunzip -c "artifacts/${{ matrix.base_tag }}.tar.gz" | docker load
          docker image inspect "${{ matrix.base_tag }}" --format '{{.Id}} {{.Architecture}} {{.Size}}'
          rm -f "artifacts/${{ matrix.base_tag }}.tar.gz"

      - name: Layer Magisk (prebuilt) + non-Zygisk hooks
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.image_tag }} \
            --build-arg BUILDPLATFORM=${{ matrix.platform }} \
            --build-arg BASE_IMAGE=${{ matrix.base_tag }} \
            --cache-from type=gha,scope=redroid-layer-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=redroid-layer-${{ matrix.arch }} \
            .

      - name: Verify image layout
        run: ./scripts/verify-image-layout.sh ${{ matrix.image_tag }} ${{ matrix.arch }}

      - name: Prepare host for redroid
        run: ./scripts/prepare-redroid-host.sh

      - name: Run real e2e test
        env:
          BOOT_TIMEOUT_SECONDS: 360
        run: ./scripts/redroid-e2e.sh ${{ matrix.image_tag }} ${{ matrix.container_name }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          img="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker tag ${{ matrix.image_tag }} "${img}:13-magisk-${{ matrix.arch }}"
          docker tag ${{ matrix.image_tag }} "${img}:latest-${{ matrix.arch }}"
          docker push "${img}:13-magisk-${{ matrix.arch }}"
          docker push "${img}:latest-${{ matrix.arch }}"

  manifest:
    needs: build-test
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail
          img="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create -t "${img}:13-magisk" \
            "${img}:13-magisk-arm64" \
            "${img}:13-magisk-amd64"

          docker buildx imagetools create -t "${img}:13-magisk-latest" \
            "${img}:13-magisk-arm64" \
            "${img}:13-magisk-amd64"

          docker buildx imagetools create -t "${img}:latest" \
            "${img}:13-magisk-arm64" \
            "${img}:13-magisk-amd64"

          echo "Multi-architecture manifest created"
