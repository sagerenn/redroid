name: Build Redroid 13 with Magisk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=13-magisk-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          # Wait a bit for image to be fully available after push
          sleep 5
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-${{ matrix.arch }}

      - name: Test Docker image
        run: |
          echo "Testing redroid 13 with Magisk - ${{ matrix.arch }} architecture"

          # Verify image can be inspected
          docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-${{ matrix.arch }}

          # Extract image and check for Magisk APK
          CONTAINER_ID=$(docker create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-${{ matrix.arch }})
          echo "Created container: $CONTAINER_ID"

          # Try to copy Magisk APK to verify it exists
          if docker cp $CONTAINER_ID:/data/local/tmp/magisk.apk ./magisk-${{ matrix.arch }}.apk 2>/dev/null; then
            echo "✓ Magisk APK found in image"
            ls -lh ./magisk-${{ matrix.arch }}.apk
          else
            echo "✗ Magisk APK not found"
            exit 1
          fi

          docker rm $CONTAINER_ID
          echo "✓ Test completed successfully for ${{ matrix.arch }}"

      - name: Verify Magisk presence
        run: |
          if [ -f ./magisk-${{ matrix.arch }}.apk ]; then
            echo "✓ Magisk APK verified ($(du -h ./magisk-${{ matrix.arch }}.apk | cut -f1))"
          else
            echo "✗ Magisk APK verification failed"
            exit 1
          fi

  manifest:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:13-magisk-amd64

          echo "✓ Multi-architecture manifest created"
